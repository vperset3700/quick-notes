services:
  callback-api:
    build:
      context: .
      dockerfile: Dockerfile.callback
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    working_dir: /app
    command: uvicorn callback_api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=3).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  sqlite-web:
    build:
      context: .
      dockerfile: Dockerfile.sqliteweb
    ports:
      - "8081:8081"
    volumes:
      - ./:/app
    working_dir: /app
    command: sqlite_web /app/cours_data.db --host 0.0.0.0 --port 8081
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./n8n_custom_nodes:/home/node/.n8n/nodes
      - ./n8n_exports:/exports
    environment:
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_PAYLOAD_SIZE_MAX=100
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:5678/healthz'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  push-to-n8n:
    build:
      context: .
      dockerfile: Dockerfile.push
    depends_on:
      callback-api:
        condition: service_healthy
      n8n:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHON_BIN=python
    command: ["/bin/bash", "/app/run_push.sh"]
    restart: unless-stopped
